<style>
  html,body{ -webkit-tap-highlight-color:transparent; }

  .no-sb::-webkit-scrollbar{ display:none; }
  .no-sb{ -ms-overflow-style:none; scrollbar-width:none; }

  /* 分頁切換動畫 */
  .page{ display:none; animation:fade .35s ease both; }
  .page.active{ display:block; }
  @keyframes fade{ from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:translateY(0)} }

  /* 底部導覽 */
  .navbtn{ transition:transform .18s cubic-bezier(.34,1.56,.64,1), color .18s; }
  .navbtn.on{ color:#F4768F; }
  .navbtn.on .navicon{ transform:translateY(-6px) scale(1.08); }
  .navbtn .navicon{
    transition:transform .25s cubic-bezier(.34,1.56,.64,1), background .2s;
  }
  .navbtn.on .navicon{ background:linear-gradient(135deg,#FF9FB2,#FFC0A8); color:#fff; box-shadow:0 8px 16px -6px rgba(244,118,143,.6); }

  /* 時間軸 */
  .tl{ position:relative; padding-left:42px; }
  .tl::before{
    content:''; position:absolute; left:15px; top:6px; bottom:6px; width:3px;
    background:linear-gradient(#FFD0DA,#BFEFE7,#D8CBF6); border-radius:3px;
  }
  .dot{
    position:absolute; left:-38px; top:11px; width:26px; height:26px; border-radius:50%;
    display:grid; place-items:center; font-size:14px; line-height:1; color:#fff;
    box-shadow:0 4px 10px -4px rgba(0,0,0,.25); border:3px solid #FFFCF9;
  }

  /* 進度條 */
  .barwrap{ background:#F3E6DE; border-radius:999px; overflow:hidden; }
  .bar{ height:100%; border-radius:999px; transition:width .5s cubic-bezier(.4,1.2,.5,1);
        background:linear-gradient(90deg,#FF9FB2,#FFD98A 60%,#8FE3D6); }

  /* 可愛 checkbox */
  .tick{ width:26px; height:26px; border-radius:9px; border:2.5px solid #F3D3CF;
         display:grid; place-items:center; flex:none; transition:.2s; background:#fff; }
  .tick .ck{ opacity:0; transform:scale(.4); transition:.2s; color:#fff; font-size:15px; font-weight:800; line-height:1; }
  .done .tick{ background:linear-gradient(135deg,#FF9FB2,#FFB39A); border-color:transparent; }
  .done .tick .ck{ opacity:1; transform:scale(1); }
  .done .lbl{ text-decoration:line-through; color:#C9B6BE; }

  /* toggle 收合 */
  .acc-body{ max-height:0; overflow:hidden; transition:max-height .4s ease; }
  .acc.open .acc-body{ max-height:4000px; }
  .acc.open .chev{ transform:rotate(180deg); }
  .chev{ transition:transform .35s; }

  .pill{ transition:transform .12s ease, box-shadow .2s; }
  .pill:active{ transform:scale(.95); }
  /* 強制按鈕內容置中（避免 Tailwind 動態類別未生效） */
  .ctrbtn{ display:flex !important; width:100% !important; align-items:center !important; justify-content:center !important; gap:6px; text-align:center; }
  .ctrpill{ display:inline-flex !important; align-items:center !important; justify-content:center !important; gap:4px; }

  /* 票價表 */
  .ttbl div:nth-child(4n+1),.ttbl div:nth-child(4n+2){ background:#FFF6F8; }

  </div>`;
}
/* ===== 天氣：Open-Meteo（免費、免金鑰、離線自動退回季節概估）===== */
let WX=null, WXstate='loading';
function tripISO(d){ var p=d.date.split('/'); return '2026-'+('0'+p[0]).slice(-2)+'-'+('0'+p[1]).slice(-2); }
function WMO(code){
  if(code<=1) return {i:'sun', t:'晴'};
  if(code<=3) return {i:'cloud', t:'多雲'};
  if(code<=48) return {i:'cloud', t:'有霧'};
  if(code>=95) return {i:'rain', t:'雷陣雨'};
  if((code>=51&&code<=67)||(code>=80&&code<=82)) return {i:'rain', t:'有雨'};
  return {i:'cloud', t:'多雲'};
}
async function loadWeather(){
  try{
    var url='https://api.open-meteo.com/v1/forecast?latitude=22.99&longitude=120.2&current=temperature_2m,precipitation,weather_code,relative_humidity_2m&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,weather_code&timezone=Asia%2FTaipei&forecast_days=16';
    var r=await fetch(url); if(!r.ok) throw 0;
    var j=await r.json(), daily={};
    (j.daily.time||[]).forEach(function(t,i){ daily[t]={tmax:Math.round(j.daily.temperature_2m_max[i]),tmin:Math.round(j.daily.temperature_2m_min[i]),psum:j.daily.precipitation_sum[i],pprob:j.daily.precipitation_probability_max[i],code:j.daily.weather_code[i]}; });
    WX={current:{temp:Math.round(j.current.temperature_2m),precip:j.current.precipitation,code:j.current.weather_code,hum:j.current.relative_humidity_2m},daily:daily};
    WXstate='ok';
  }catch(e){ WXstate='fail'; }
  if($('#page-daily').classList.contains('active')) renderDaily();
}
function weatherHTML(d){
  var seasonal='<p class="text-[11px] text-mute mt-1.5 leading-snug">季節概估：'+U.esc(d.weather)+'</p>';
  if(WXstate==='loading') return '<div class="text-[12.5px] text-mute">讀取台南即時天氣中…</div>'+seasonal;
  if(WXstate==='fail') return '<div class="flex items-center gap-2 text-[12.5px] font-medium text-plum/80">'+ic('cloud')+'<span>'+U.esc(d.weather)+'</span></div><p class="text-[11px] text-mute mt-1">目前無法連線取得即時天氣，顯示季節概估</p>';
  var iso=tripISO(d), fc=WX.daily[iso];
  if(fc){ var w=WMO(fc.code);
    return '<div class="flex items-center gap-2 text-[13.5px] font-bold text-plum">'+ic(w.i)+'<span>當日預報 '+fc.tmin+'–'+fc.tmax+'\u00B0C</span></div>'
      +'<p class="text-[12px] text-plum/75 mt-1">'+w.t+'｜降雨機率 '+(fc.pprob==null?'—':fc.pprob)+'%｜雨量 '+fc.psum+' mm</p>'
      +'<p class="text-[10.5px] text-mintd font-bold mt-1">即時資料 · Open-Meteo</p>'+seasonal;
  }
  var c=WX.current, w=WMO(c.code);
  return '<div class="flex items-center gap-2 text-[13.5px] font-bold text-plum">'+ic(w.i)+'<span>目前台南 '+c.temp+'\u00B0C</span></div>'
    +'<p class="text-[12px] text-plum/75 mt-1">'+w.t+'｜即時降雨 '+c.precip+' mm｜濕度 '+c.hum+'%</p>'
    +'<p class="text-[11px] text-mute mt-1">'+d.date+' 當日預報將於出發前約 16 天開放</p>'+seasonal;
}

  return `
  <div class="flex items-center gap-2 mt-2">
    <div class="barwrap flex-1 h-3"><div class="bar" style="width:${pct}%;background:${color}"></div></div>
    <span class="font-round font-extrabold text-[13px] text-plum w-11 text-right">${pct}%</span>
  </div>
  <p class="text-[11px] text-mute mt-1">已打包 ${done} / ${total} 項</p>`;
}

function itemRow(it){
  return `
    <div class="flex items-center gap-3 py-2 ${it.done?'done':''}">
      <button data-act="toggle" data-id="${it.id}" class="tk flex items-center gap-3 flex-1 text-left">
        <span class="tick"><span class="ck pointer-events-none">✓</span></span>
        <span class="lbl text-[14px] text-plum font-medium leading-snug pointer-events-none">${U.esc(it.n)}</span>
      </button>
      <button data-act="del" data-id="${it.id}" aria-label="刪除" class="del shrink-0 inline-flex items-center justify-center w-8 h-8 text-[15px] font-bold text-peachd bg-peach/15 rounded-full active:scale-90"><span class="pointer-events-none leading-none">✕</span></button>
    </div>`;
}

function addRow(act, catId, placeholder){
  const cat = catId ? ` data-cat="${catId}"` : '';
  return `
    <div class="flex gap-2 mt-2">
      <input type="text" data-addinput="${act}"${cat} placeholder="${placeholder}"
        class="flex-1 bg-milk rounded-2xl px-4 py-2.5 text-[13.5px] text-plum placeholder-mute/60 outline-none border border-line focus:border-peach transition" />
      <button data-act="${act}"${cat} aria-label="新增" class="pill bg-gradient-to-br from-peach to-butter text-white w-11 rounded-2xl grid place-items-center shadow-soft active:scale-95 shrink-0"><span class="pointer-events-none" style="font-size:20px;line-height:1">＋</span></button>
    </div>`;
}

/* ----- 以 id 操作資料（不依賴陣列索引）----- */
function toggleItem(id){
  const b = backpack.find(i=>i.id===id);
  if(b){ b.done=!b.done; return; }
  for(const c of suitcase){ const x=c.items.find(i=>i.id===id); if(x){ x.done=!x.done; return; } }
}
function delItem(id){
  const bi = backpack.findIndex(i=>i.id===id);
  if(bi>-1){ backpack.splice(bi,1); return; }
  for(const c of suitcase){ const xi=c.items.findIndex(i=>i.id===id); if(xi>-1){ c.items.splice(xi,1); return; } }
}

let focusAfter = null; // 新增後要重新聚焦的輸入框

function renderLists(){
  const wrap = $('#page-lists');

  const bpDone = backpack.filter(i=>i.done).length;
  const scAll  = suitcase.flatMap(c=>c.items);
  const scDone = scAll.filter(i=>i.done).length;

  const bpRows = backpack.map(itemRow).join('') || `<p class="text-[12.5px] text-mute py-2">清單是空的，從下方新增吧！</p>`;

  const catBlocks = suitcase.map(c=>{
    const cDone = c.items.filter(i=>i.done).length;
    const rows = c.items.map(itemRow).join('') || `<p class="text-[12.5px] text-mute py-1">尚無項目</p>`;
    return `
      <div class="acc rounded-2xl border border-line overflow-hidden ${c.open?'open':''}">
        <button data-act="cat" data-cat="${c.id}" class="acc-head w-full flex items-center gap-2 px-3.5 py-3 bg-milk text-left">
          <span class="text-mintd text-[13px] pointer-events-none">${ic('layers')}</span>
          <span class="font-round font-bold text-plum text-[14px] flex-1 pointer-events-none">${U.esc(c.cat)}</span>
          <span class="text-[11.5px] font-bold text-mute pointer-events-none">${cDone}/${c.items.length}</span>
          <span class="chev text-mute text-[13px] pointer-events-none" style="display:inline-block;line-height:1">▾</span>
        </button>
        <div class="acc-body">
          <div class="px-3.5 pb-2">${rows}</div>
          <div class="px-3.5 pb-3">${addRow('add-sc', c.id, '新增「'+c.cat+'」物品…')}</div>
        </div>
      </div>`;
  }).join('');

  wrap.innerHTML = `
    <div class="flex items-center gap-2 mb-3 px-1">
      <span class="font-round font-extrabold text-plum text-lg">打包清單</span>
      <span class="h-px flex-1 bg-line"></span>
    </div>

    <div class="bg-card rounded-xl3 shadow-softer border border-line overflow-hidden mb-4">
      <div class="px-4 pt-4 pb-3 bg-gradient-to-br from-peach/20 to-butter/15">
        <p class="font-round font-extrabold text-plum text-[16px]">${ic('backpack')} 隨身背包清單</p>
        ${progressBar(bpDone, backpack.length, 'linear-gradient(90deg,#FF9FB2,#FFD98A)')}
      </div>
      <div class="px-4 py-2">${bpRows}</div>
      <div class="px-4 pb-4">${addRow('add-bp', '', '新增背包物品…')}</div>
    </div>

    <div class="bg-card rounded-xl3 shadow-softer border border-line overflow-hidden mb-4">
      <div class="px-4 pt-4 pb-3 bg-gradient-to-br from-sky/25 to-mint/15">
        <p class="font-round font-extrabold text-plum text-[16px]">${ic('suitcase')} 行李箱清單</p>
        ${progressBar(scDone, scAll.length, 'linear-gradient(90deg,#8FE3D6,#A9DCEF)')}
      </div>
      <div class="px-4 py-3 space-y-3">${catBlocks}</div>
    </div>

    <div class="bg-card rounded-xl3 shadow-softer border border-line overflow-hidden mb-4">
      <div class="px-4 pt-4 pb-2 bg-gradient-to-br from-lav/25 to-peach/10">
        <p class="font-round font-extrabold text-plum text-[16px]">${ic('note')} 個人備忘錄</p>
        <p class="text-[11px] text-mute mt-0.5">隨手記，會自動儲存在這台裝置</p>
      </div>
      <div class="px-4 py-3">
        <textarea id="memo-ta" rows="6" placeholder="例如：糸糸的健保卡放外袋、果果暈車藥、預約飯店接駁電話…"
          class="w-full bg-milk rounded-2xl px-4 py-3 text-[13.5px] text-plum placeholder-mute/60 outline-none border border-line focus:border-lav transition leading-relaxed resize-none"></textarea>
        <p id="memo-saved" class="text-[11px] text-mintd font-bold mt-1.5 opacity-0 transition"><span class="mr-1">•</span>已儲存</p>
      </div>
    </div>

    <div class="mt-1 text-center">
      <button data-act="reset" class="text-[11.5px] text-mute/70 underline underline-offset-2"><span class="mr-1 pointer-events-none">↺</span>還原為預設清單</button>
    </div>`;

  // 備忘錄（每次重繪重新指定值與監聽，輸入不觸發重繪故無索引問題）
  const ta = wrap.querySelector('#memo-ta'); ta.value = memo;
  const savedTip = wrap.querySelector('#memo-saved');
  let t;
  ta.addEventListener('input', ()=>{
    memo = ta.value; LS.set('tn_memo', memo);
    savedTip.style.opacity='1'; clearTimeout(t); t=setTimeout(()=>savedTip.style.opacity='0',1200);
  });

  // 新增後把焦點放回對應輸入框
  if(focusAfter){
    const sel = focusAfter==='add-bp'
      ? 'input[data-addinput="add-bp"]'
      : `input[data-addinput="add-sc"][data-cat="${focusAfter}"]`;
    const el = wrap.querySelector(sel); if(el) el.focus();
    focusAfter = null;
  }
}

/* 取輸入框的值並加入清單 */
function doAdd(act, catId, value){
  const v = (value||'').trim(); if(!v) return;
  if(act==='add-bp'){ backpack.push({id:uid(), n:v, done:false}); focusAfter='add-bp'; }
  else { const c = suitcase.find(c=>c.id===catId); if(c){ c.items.push({id:uid(), n:v, done:false}); c.open=true; focusAfter=catId; } }
  saveAll(); renderLists();
}

/* ----- 事件委派：在容器 #page-lists 上只綁一次，重繪也不會失效 ----- */
(function bindLists(){
  const wrap = $('#page-lists');
  wrap.addEventListener('click', e=>{
    const el = e.target.closest('[data-act]'); if(!el || !wrap.contains(el)) return;
    const act = el.dataset.act;
    if(act==='toggle'){ toggleItem(el.dataset.id); saveAll(); renderLists(); }
    else if(act==='del'){ delItem(el.dataset.id); saveAll(); renderLists(); }
    else if(act==='cat'){ const c=suitcase.find(c=>c.id===el.dataset.cat); if(c){ c.open=!c.open; saveAll(); renderLists(); } }
    else if(act==='add-bp'){ const inp=wrap.querySelector('input[data-addinput="add-bp"]'); doAdd('add-bp','', inp && inp.value); }
    else if(act==='add-sc'){ const cid=el.dataset.cat; const inp=wrap.querySelector(`input[data-addinput="add-sc"][data-cat="${cid}"]`); doAdd('add-sc', cid, inp && inp.value); }
    else if(act==='reset'){
      if(confirm('確定要還原成預設清單嗎？已勾選與新增的項目會被清除。')){
        backpack = normBackpack(JSON.parse(JSON.stringify(DEF_BACKPACK)));
        suitcase = normSuitcase(JSON.parse(JSON.stringify(DEF_SUITCASE)));
        memo=''; saveAll(); renderLists();
      }
    }
  });
  wrap.addEventListener('keydown', e=>{
    if(e.key!=='Enter') return;
    const inp = e.target.closest('input[data-addinput]'); if(!inp) return;
    e.preventDefault();
    doAdd(inp.dataset.addinput, inp.dataset.cat||'', inp.value);
  });
})();

/* ============================================================
   分頁切換
============================================================ */
const PAGES = {
  overview:'#page-overview',
  stay:'#page-stay',
  daily:'#page-daily',
  lists:'#page-lists'
};
function switchTab(tab){
  Object.values(PAGES).forEach(p=>$(p).classList.remove('active'));
  $(PAGES[tab]).classList.add('active');
  document.querySelectorAll('.navbtn').forEach(b=>b.classList.toggle('on', b.dataset.tab===tab));
  window.scrollTo({top:0,behavior:'smooth'});
}
document.querySelectorAll('.navbtn').forEach(b=>{
  b.onclick = ()=>switchTab(b.dataset.tab);
});

/* ============================================================
   初始化
============================================================ */
renderOverview();
renderStay();
renderDaily();
renderLists();
loadWeather();
</script>
</body>
</html>
